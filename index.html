<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>فرم ثبت سرکشی سرپرستان مویرگی</title>
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; font-family: Vazirmatn, sans-serif; }
    body { margin: 0; padding: 16px; background: #f1f5f9; color: #0f172a; }
    .card { max-width: 720px; margin: 0 auto; background: #fff; border-radius: 18px; padding: 20px; box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08); }
    h2 { margin: 0 0 20px; text-align: center; font-size: 22px; color: #1e293b; }
    .field { margin-bottom: 18px; }
    label { display: block; margin-bottom: 8px; font-weight: 700; color: #334155; font-size: 14px; }
    input, select { width: 100%; border: 1.5px solid #cbd5e1; border-radius: 12px; padding: 12px 14px; font-size: 14px; }
    .camera-box { border: 1.5px solid #e2e8f0; border-radius: 16px; padding: 12px; background: #f8fafc; text-align: center; margin-bottom: 10px; }
    video, img { width: 100%; border-radius: 12px; background: #000; display: block; }
    canvas { display: none; } /* کانواس مخفی برای پردازش واترمارک */
    .photo-preview { display: none; margin-top: 10px; border: 2px solid #10b981; }
    .camera-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
    button { border: none; border-radius: 12px; padding: 12px; cursor: pointer; font-weight: 700; }
    .primary-btn { background: #2563eb; color: #fff; }
    .secondary-btn { background: #e2e8f0; color: #334155; }
    .danger-btn { background: #fee2e2; color: #ef4444; }
    .submit-btn { width: 100%; background: #10b981; color: #fff; font-size: 16px; min-height: 52px; margin-top: 10px; }
    .status { margin-top: 8px; font-size: 13px; text-align: center; color: #64748b; }
    .add-shelf-btn { width: 100%; background: #f1f5f9; color: #0f172a; border: 1.5px dashed #94a3b8; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>فرم ثبت سرکشی</h2>
    <form id="mainForm">
      <div class="field">
        <label>۱) نام سرپرست</label>
        <select id="supervisor" required><option value="">انتخاب کنید...</option>
          <option value="دنیا کرمی">دنیا کرمی</option><option value="مائده بهشتی">مائده بهشتی</option>
          <option value="محمد شیرمحمدیان">محمد شیرمحمدیان</option><option value="محمد رضایی زنده دل">محمد رضایی زنده دل</option>
          <option value="مهسا کلیدری">مهسا کلیدری</option><option value="ندا دهزاده">ندا دهزاده</option>
          <option value="نگار شهمراد">نگار شهمراد</option><option value="علی معصوم نژاد">علی معصوم نژاد</option>
        </select>
      </div>
      <div class="field"><label>۲) کد فروشگاه</label><input type="number" id="shop_code" required></div>
      <div class="field"><label>۳) نام نیرو</label><select id="staff_name" required disabled><option value="">ابتدا سرپرست را انتخاب کنید</option></select></div>
      
      <!-- عکس ورود -->
      <div class="field"><label>۴) عکس ورود</label>
        <div class="camera-box">
          <video id="v_entry" autoplay playsinline muted></video>
          <canvas id="c_entry"></canvas>
          <img id="p_entry" class="photo-preview" />
          <div class="camera-actions">
            <button type="button" class="primary-btn" onclick="startCam('entry')">دوربین</button>
            <button type="button" id="t_entry" class="secondary-btn" onclick="takePhoto('entry')" disabled>ثبت</button>
            <button type="button" id="r_entry" class="danger-btn" onclick="resetCameraBox('entry')" disabled>حذف</button>
          </div>
          <div id="s_entry" class="status">دوربین خاموش</div>
          <input type="file" id="f_entry" hidden required />
        </div>
      </div>

      <div class="field"><label>۵) عکس شلف</label><div id="shelfContainer"></div><button type="button" class="add-shelf-btn" onclick="addShelfBox()">+ افزودن شلف</button></div>

      <!-- عکس خروج -->
      <div class="field"><label>۶) عکس خروج</label>
        <div class="camera-box">
          <video id="v_exit" autoplay playsinline muted></video>
          <canvas id="c_exit"></canvas>
          <img id="p_exit" class="photo-preview" />
          <div class="camera-actions">
            <button type="button" class="primary-btn" onclick="startCam('exit')">دوربین</button>
            <button type="button" id="t_exit" class="secondary-btn" onclick="takePhoto('exit')" disabled>ثبت</button>
            <button type="button" id="r_exit" class="danger-btn" onclick="resetCameraBox('exit')" disabled>حذف</button>
          </div>
          <div id="s_exit" class="status">دوربین خاموش</div>
          <input type="file" id="f_exit" hidden required />
        </div>
      </div>
      <button type="submit" id="submitBtn" class="submit-btn">ثبت نهایی در دیتابیس</button>
    </form>
  </div>

  <script>
    const SUPABASE_URL = "https://jlvffhlfsshbdcxrcvjl.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsdmZmaGxmc3NoYmRjeHJjdmpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3NjM4NzUsImV4cCI6MjA5OTMzOTg3NX0.vbuRXTBcdUMLOTZ9p-aCTO30fbPbAYclzPe0oVmeeog"; 
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let exitLat = null, exitLon = null, exitAddress = "", entryTime = null, exitTime = null;

    const staffData = {
        "دنیا کرمی": ["الهام فاضلی", "امیر فرجی", "امیرحسین سلطان پناه", "رقیه عبدلرضائی زاده", "زینب فاضل زاده", "لیلا خانمحمدلو", "مریم سلیمانی", "مریم ترنیان"],
        "مائده بهشتی": ["رویا حاجیوند", "زهرا خلخالی", "شهلا جوانمردنیا", "ظریفه رائی", "فاطمه الله وردی", "معصومه شورابی", "معصومه مرادی"],
        "محمد شیرمحمدیان": ["امیر عبدی", "سوده سروقدی", "محمد غیبی", "مریم هفتانی"],
        "محمد رضایی زنده دل": ["فاطمه عزیزی", "فاطمه نوری", "فائزه رهنما دلچه", "مائده شعبان زاده", "مریم رستمی کرکرق", "نعیمه فرشاد"],
        "مهسا کلیدری": ["الهام اسدپور", "الهام عسکری", "بهاره اولیایی", "ثریا دهقانی", "حمیده صدیقی", "خدیجه تیموری", "زینب دهقانی", "سمیه ارغوانی", "سهیلا توسلی", "فاطمه رمضانی", "فاطمه غفوریان", "کعبه صفری پور", "ملیحه عباسی", "هانیه رحیمی"],
        "ندا دهزاده": ["زهرا خاکزاد", "سارا مهدی زاده", "سحر جعفری", "سمانه احمدی", "فاطمه اندراجمی ساداتی", "مرجان کونوشیان", "مریم سادات حسینی", "مهدیه قاسمی", "مهسا فیض آبادی", "مینا امیری"],
        "نگار شهمراد": ["پریسا بهمنش راد", "حدیثه حاتمی", "رها حاجیانی", "زهرا صفدری", "زهرا یسلیانی", "عاطفه دریس", "مریم محمدی", "مهسا امامی", "یلدا آورند"],
        "علی معصوم نژاد": ["پریسا بهمنش راد", "حدیثه حاتمی", "رها حاجیانی", "زهرا صفدری", "زهرا یسلیانی", "عاطفه دریس", "مریم محمدی", "مهسا امامی", "یلدا آورند"]
    };

    // --- توابع کمکی واترمارک (دقیقا مطابق کدی که دادی) ---
    function getPersianNow() {
      const now = new Date();
      const date = new Intl.DateTimeFormat("fa-IR-u-ca-persian-nu-latn", {year: "numeric", month: "2-digit", day: "2-digit"}).format(now);
      const time = new Intl.DateTimeFormat("fa-IR-u-nu-latn", {hour: "2-digit", minute: "2-digit", hour12: false}).format(now);
      return `${time} | ${date}`;
    }

    async function getLocationFull() {
      try {
        const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, {timeout: 10000}));
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        const gps = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
        
        // ذخیره برای دیتابیس
        exitLat = lat; exitLon = lon;

        try {
          const resp = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=fa`);
          const data = await resp.json();
          const addr = data.display_name || "";
          exitAddress = addr;
          return addr ? `${addr} | ${gps}` : gps;
        } catch { return gps; }
      } catch { return "موقعیت یافت نشد"; }
    }

    function drawWatermark(canvas, lines) {
      const ctx = canvas.getContext("2d");
      const fontSize = Math.max(16, Math.round(canvas.width * 0.018));
      const lineGap = Math.round(fontSize * 0.45);
      const padding = Math.round(fontSize * 0.6);

      ctx.save();
      ctx.font = `bold ${fontSize}px Tahoma, Arial, sans-serif`;
      ctx.direction = "rtl"; ctx.textAlign = "right"; ctx.textBaseline = "top";

      const maxWidth = Math.max(...lines.map(l => ctx.measureText(l).width));
      const rectWidth = maxWidth + (padding * 2);
      const rectHeight = (fontSize * lines.length) + (lineGap * (lines.length - 1)) + (padding * 2);
      
      ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
      ctx.fillRect(canvas.width - 20 - rectWidth, canvas.height - 20 - rectHeight, rectWidth, rectHeight);

      ctx.fillStyle = "#ffffff";
      lines.forEach((line, i) => {
        ctx.fillText(line, canvas.width - 20 - padding, canvas.height - 20 - rectHeight + padding + i * (fontSize + lineGap));
      });
      ctx.restore();
    }

    // --- منطق دوربین و ثبت ---
    async function takePhoto(type) {
      const staff = document.getElementById("staff_name").value;
      const code = document.getElementById("shop_code").value;
      if(!staff || !code) return alert("ابتدا نام نیرو و کد فروشگاه را وارد کنید.");

      const video = document.getElementById(`v_${type}`);
      const canvas = document.getElementById(`c_${type}`);
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0);

      document.getElementById(`s_${type}`).textContent = "در حال پردازش واترمارک و GPS...";
      
      const locText = (type === 'exit') ? await getLocationFull() : "لوکیشن ثبت نشد";
      const typeLabel = (type === 'entry') ? "ورود" : "خروج";
      const lines = [
        `عکس ${typeLabel}: ${staff} | ${getPersianNow()} | کد:${code}`,
        locText
      ];

      drawWatermark(canvas, lines);

      canvas.toBlob(blob => {
        const file = new File([blob], `${type}.jpg`, { type: "image/jpeg" });
        const dt = new DataTransfer(); dt.items.add(file);
        document.getElementById(`f_${type}`).files = dt.files;
        
        document.getElementById(`p_${type}`).src = URL.createObjectURL(blob);
        document.getElementById(`p_${type}`).style.display = "block";
        video.style.display = "none";
        document.getElementById(`t_${type}`).disabled = true;
        document.getElementById(`r_${type}`).disabled = false;
        document.getElementById(`s_${type}`).textContent = "عکس با واترمارک ثبت شد.";
        
        if(type === 'entry') entryTime = new Date().toISOString();
        if(type === 'exit') exitTime = new Date().toISOString();
      }, "image/jpeg", 0.9);
    }

    // --- ثبت نهایی در Supabase ---
    document.getElementById("mainForm").addEventListener("submit", async e => {
      e.preventDefault();
      const btn = document.getElementById("submitBtn");
      btn.disabled = true; btn.textContent = "در حال ارسال به Supabase...";

      try {
        const upload = async (file, folder) => {
          const path = `${folder}/${Date.now()}.jpg`;
          await supabaseClient.storage.from("Raptor").upload(path, file);
          return supabaseClient.storage.from("Raptor").getPublicUrl(path).data.publicUrl;
        };

        const entryUrl = await upload(document.getElementById("f_entry").files[0], "entry");
        const exitUrl = await upload(document.getElementById("f_exit").files[0], "exit");

        await supabaseClient.from("daily_reports").insert([{
          supervisor: document.getElementById("supervisor").value,
          shop_code: document.getElementById("shop_code").value,
          staff_name: document.getElementById("staff_name").value,
          entry_photo_url: entryUrl,
          exit_photo_url: exitUrl,
          latitude: exitLat,
          longitude: exitLon,
          location_text: exitAddress,
          entry_time: entryTime,
          exit_time: exitTime
        }]);

        alert("اطلاعات با موفقیت در دیتابیس ثبت شد.");
        location.reload();
      } catch (err) { alert("خطا: " + err.message); btn.disabled = false; }
    });

    // سایر توابع
    function startCam(t) { navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(s=>{document.getElementById(`v_${t}`).srcObject=s;document.getElementById(`t_${t}`).disabled=false;document.getElementById(`s_${t}`).textContent="دوربین فعال است";});}
    function resetCameraBox(t) { location.reload(); }
    document.getElementById("supervisor").onchange = function() {
        const s = document.getElementById("staff_name"); s.innerHTML = '<option value="">انتخاب کنید...</option>';
        if(staffData[this.value]) { staffData[this.value].forEach(n => s.innerHTML += `<option value="${n}">${n}</option>`); s.disabled = false; }
    };
    function addShelfBox() {
        const d = document.createElement("div"); d.className = "camera-box";
        d.innerHTML = `عکس شلف <input type="file" accept="image/*">`;
        document.getElementById("shelfContainer").appendChild(d);
    }
  </script>
</body>
</html>
